name: meet_videosdk
description: "Real-time 1:1 voice/video calling app over WebRTC with live presence and in-call chat."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.2
  flutter_webrtc: ^1.5.0
  freezed_annotation: ^3.1.0
  go_router: ^17.3.0
  json_annotation: ^4.12.0
  logger: ^2.7.0
  permission_handler: ^12.0.3
  riverpod_annotation: ^4.0.3
  socket_io_client: ^3.1.5

dev_dependencies:
  build_runner: ^2.15.0
  flutter_test:
    sdk: flutter
  freezed: ^3.2.6-dev.1
  json_serializable: ^6.14.0
  riverpod_generator: ^4.0.4
  very_good_analysis: ^10.2.0

flutter:
  uses-material-design: true
